<!DOCTYPE html>
<html>
<head>
  <style>
    canvas { border: 1px solid #ccc; cursor: text; display: block; }
  </style>
</head>
<body>
  <input type="file" id="imgupload" accept="image/*"> 
  <input type="text" id="topText" placeholder="toptext">
  <input type="text" id="bottomText" placeholder="bottomtext">
  <canvas id="myCanvas" width="500" height="800"></canvas>
  <button id="downloadMeme">download meme</button>
  <script>
    const imgUpload = document.getElementById("imgupload");
    const topText = document.getElementById("topText");
    const bottomText = document.getElementById("bottomText");
    const canvas = document.getElementById("myCanvas");
    const downloadButton = document.getElementById("downloadMeme")
    const ctx = canvas.getContext('2d');

    let uploadImage; 
    imgUpload.addEventListener("change", (event) => {
      const reader = new FileReader();
      reader.onload = function () {
        uploadImage = new Image();
        uploadImage.src = reader.result;
        uploadImage.onload = () => drawMeme()
      }
      reader.readAsDataURL(event.target.files[0])
    })

    function drawMeme() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(uploadImage, 0, 0, canvas.width, canvas.height)

      ctx.font = '20px Arial';
      ctx.fillStyle = 'black'; 

      ctx.fillText(topText.value, canvas.width/2, 40)
      ctx.fillText(bottomText.value, canvas.width/2, canvas.height - 20)
    }

    topText.addEventListener('input', drawMeme)
    bottomText.addEventListener('input', drawMeme)

    downloadButton.addEventListener('click', () => {
      const link  = document.createElement('a');
      link.download = 'meme.png';
      link.href = canvas.toDataURL();
      link.click();
    })
      
  </script>
